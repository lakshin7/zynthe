# =============================================================================
# Zynthe Knowledge Distillation Toolkit - Default Configuration
# =============================================================================
# This configuration is optimized for Mac M2 (MPS) but works on CUDA/CPU too
# =============================================================================

# Training Configuration
train:
  epochs: 3                      # Number of training epochs (low for fast testing)
  batch_size: 8                  # Batch size (optimized for Mac M2 memory)
  lr: 2e-5                       # Learning rate (reduced for better convergence)
  grad_accum_steps: 1            # Gradient accumulation steps (increase if OOM)
  mixed_precision: false         # Use mixed precision (MPS prefers float32)
  early_stop_patience: 2         # Stop if val_loss doesn't improve for N epochs
  save_best_only: true           # Only save checkpoints that improve validation loss
  log_interval: 10               # Log training metrics every N steps

# Model Configuration
model:
  # Teacher model (larger, pre-trained model with better performance)
  name: "bert-base-uncased"                    # Teacher: BERT-base (110M params)
  
  # Student model (smaller, faster model to be trained via distillation)
  student_name: "distilbert-base-uncased"      # Student: DistilBERT (66M params, ~40% smaller)
  
  # Model type
  type: "transformer"                          # Both are sequence classification transformers
  
  # Tokenizer configuration
  tokenizer_name: "distilbert-base-uncased"   # Use DistilBERT tokenizer (no token_type_ids)
  max_length: 128                              # Maximum sequence length for tokenization
  
  # Number of output classes (for classification tasks)
  num_labels: 2                                # Binary classification (e.g., sentiment)

# Knowledge Distillation Configuration
distillation:
  method: "kd_hinton"            # Method: kd_hinton, fitnet, attention, etc.
  temperature: 1.5               # Temperature for softening predictions (lower = sharper)
  alpha: 0.4                     # Weight for hard labels (1-alpha for soft labels)
  
  # Optional: Advanced distillation parameters
  # beta: 0.1                    # Weight for intermediate layer matching (if applicable)
  # gamma: 0.1                   # Weight for attention transfer (if applicable)

# Data Configuration
data:
  train_path: "data/imdb_train.jsonl"   # Path to training data (JSONL format)
  val_path: "data/imdb_val.jsonl"       # Path to validation data (JSONL format)
  
  # Optional data augmentation settings
  # augmentation:
  #   enable: false
  #   methods: ["synonym_replacement", "random_insertion"]

# Device Configuration
device:
  prefer_mps: true               # Prefer Apple Silicon MPS backend (Mac M1/M2/M3)
  prefer_cuda: false             # Prefer NVIDIA CUDA (set to true for GPU servers)

# Experiment Output Configuration
output_root: "experiments"       # Root directory for experiment outputs
seed: 42                         # Random seed for reproducibility

# Quantization Configuration
quantization:
  enable: true                   # Enable model quantization for inference
  mode: ptq                      # Post-Training Quantization (ptq) or Quantization-Aware Training (qat)
  # dtype: "int8"                # Quantization data type (int8, fp16, etc.)

# Similarity Transfer (optional advanced feature)
similarity_transfer: true        # Enable similarity-preserving knowledge transfer

# Explainability Configuration (optional)
explainability:
  enable_shap: false             # Enable SHAP analysis for model interpretability
  enable_lime: false             # Enable LIME analysis for local explanations
  shap_samples: 100              # Number of samples for SHAP analysis
  lime_samples: 500              # Number of samples for LIME analysis

# Evaluation & Comparison
evaluate: true                   # Run final evaluation after training
compare_models: true             # Compare teacher vs student after training (generates visualizations)

# Logging & Monitoring (optional)
# tensorboard:
#   enable: true                 # Enable TensorBoard logging
#   log_dir: "tensorboard"       # TensorBoard log directory (relative to experiment dir)

# Checkpointing (optional)
# checkpointing:
#   save_interval: 1             # Save checkpoint every N epochs
#   keep_last_n: 3               # Keep only the last N checkpoints