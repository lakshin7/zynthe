name: Feature Request
description: Suggest an idea for Zynthe
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature for Zynthe!
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear and concise description of what you want to achieve.
      placeholder: It would be great if Zynthe could...
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: Use Case
      description: How would this feature be used? What problem does it solve?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
