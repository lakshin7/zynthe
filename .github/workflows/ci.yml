name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install core + dev
      run: |
        python -m pip install --upgrade pip
        # Install the core surface (mirrors a fresh "pip install zynthe") so
        # the optional-imports test catches regressions where a dep leaks
        # into the hard-requirements.
        pip install .
        pip install ".[dev,all]"

    - name: Lint with flake8
      run: |
        flake8 src/zynthe tests/

    - name: Test with pytest
      run: |
        pytest --cov=src/zynthe --cov-report=xml tests/

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
