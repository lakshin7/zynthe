# Student Model Configuration Template
# Generated by AutoStudentBuilder

model:
  name: "{teacher_name}"
  student_name: "auto_student_{strategy}"
  type: "transformer"
  tokenizer_name: "{teacher_name}"
  max_length: 128
  
  # Auto-generated student architecture
  student_architecture:
    num_layers: {num_layers}
    hidden_size: {hidden_size}
    num_attention_heads: {num_attention_heads}
    intermediate_size: {intermediate_size}
    vocab_size: {vocab_size}
    max_position_embeddings: 512
    type_vocab_size: 2
    layer_norm_eps: 1e-12
    hidden_dropout_prob: 0.1
    attention_probs_dropout_prob: 0.1

data:
  dataset: "imdb"
  max_samples: 1000
  split_ratio: 0.8

train:
  epochs: 3
  batch_size: 8
  lr: 2e-5
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_steps: 100
  gradient_accumulation: 1
  max_grad_norm: 1.0
  
  # Optimizer config (advanced)
  optimizer_config:
    type: "adamw"
    lr: 2e-5
    betas: [0.9, 0.999]
    eps: 1e-8
    weight_decay: 0.01
    
  # Scheduler config (advanced)
  scheduler_config:
    type: "cosine"
    warmup_steps: 100
    warmup_ratio: 0.1

distillation:
  method: "kd_hinton"
  temperature: 2.0
  alpha: 0.5
  
evaluation:
  metrics: ["accuracy", "f1", "precision", "recall"]
  extended_metrics: true
  
device: "mps"
seed: 42
output_dir: "experiments"

# Metadata
metadata:
  generated_by: "AutoStudentBuilder"
  teacher: "{teacher_name}"
  compression_ratio: {compression_ratio}
  strategy: "{strategy}"
  teacher_params: {teacher_params}
  student_params: {student_params}
  compression_achieved: {compression_achieved}
