# Multi-Stage Distillation Configuration
# ========================================

# Training settings
training:
  epochs_per_stage: 3  # Default epochs if not specified per stage
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_steps: 500
  device: "cuda"  # Will be auto-selected by preflight

# Data settings
data:
  batch_size: 32
  num_workers: 4
  pin_memory: true

# Distillation settings
distillation:
  multi_stage: true  # Enable multi-stage distillation
  
  # Optional: custom loss schedule
  loss_schedule:
    1:  # Stage 1: Logit only
      alpha: 1.0
      beta: 0.0
      gamma: 0.0
    2:  # Stage 2: Logit + Feature
      alpha: 0.5
      beta: 0.5
      gamma: 0.0
    3:  # Stage 3: Balanced
      alpha: 0.3
      beta: 0.4
      gamma: 0.3
    4:  # Stage 4: Attention focus
      alpha: 0.1
      beta: 0.2
      gamma: 0.7
  
  # Stage definitions
  stages:
    - name: "Stage 1 - Logit Alignment"
      type: kd
      epochs: 3
      config:
        temperature: 4.0
        alpha: 0.9
      
    - name: "Stage 2 - Feature Refinement"
      type: feature
      epochs: 3
      config:
        beta: 0.6
        feature_stages: [1, 2, 3]
        feature_loss_weight: 1.0
      freeze_layers: []  # Don't freeze any layers
      knowledge_replay: false
    
    - name: "Stage 3 - Feature Fine-Tuning"
      type: feature
      epochs: 2
      config:
        beta: 0.4
        feature_stages: [1, 2, 3, 4]
      freeze_layers: [0, 1, 2]  # Freeze early layers
      knowledge_replay: true  # Replay previous knowledge
    
    - name: "Stage 4 - Final Polish"
      type: kd
      epochs: 2
      config:
        temperature: 2.0
        alpha: 0.7
      freeze_layers: []

# Preflight configuration (will be auto-populated)
preflight:
  model_type: null  # Auto-detected
  compression_ratio: null  # Auto-calculated
  recommended_stages: null  # Auto-generated

# Output settings
output:
  experiment_dir: "experiments/multi_stage"
  save_checkpoints: true
  save_reports: true
  log_interval: 100
