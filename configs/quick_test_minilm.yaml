# Quick Test Configuration with Smaller Models
# Using DistilRoBERTa models - lightweight and available on HuggingFace
# Works with existing IMDB data

train:
  epochs: 2  # Quick test
  batch_size: 16
  lr: 3e-5
  grad_accum_steps: 1
  mixed_precision: false
  early_stop_patience: 2
  warmup_steps: 50

model:
  # Teacher: RoBERTa-base (125M parameters)
  name: "roberta-base"
  
  # Student: DistilRoBERTa (82M parameters - 1.5x compression)
  student_name: "distilroberta-base"
  
  type: "transformer"
  tokenizer_name: "roberta-base"
  max_length: 128
  pad_to_max_length: true

distillation:
  method: "kd_hinton"
  temperature: 2.0
  alpha: 0.5

data:
  train_path: "data/imdb_train.jsonl"  # Using existing IMDB data
  val_path: "data/imdb_val.jsonl"
  preprocessing:
    max_examples: 1000  # Very small for quick test (5-10 min)
    cache_tokenization: true

device:
  prefer_mps: true
  prefer_cuda: false
  fallback_cpu: true
  
  memory_management:
    enable: true
    max_memory_gb: 6
    gradient_checkpointing: false
    clear_cache_every_epoch: true

output_root: "experiments"
seed: 42

quantization:
  enable: true
  mode: "float16"
  ptq:
    calibration_samples: 32

similarity_transfer: true

evaluate:
  enable: true
  metrics: ["accuracy", "f1"]
  save_predictions: false

experiment:
  save_checkpoints: false
  log_level: "INFO"

performance:
  profile_memory: false
  log_timing: true

# Enable visualization
visualization:
  enable: true
  save_plots: true
  plot_attention: false  # Disable for speed
  plot_confusion_matrix: true
