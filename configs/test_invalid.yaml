# Test config with missing teacher model (INVALID - for testing preflight)

train:
  epochs: 3
  batch_size: 8
  lr: 5e-5

model:
  # MISSING: name (teacher model) - This should trigger validation error
  student_name: "distilbert-base-uncased"
  type: "transformer"
  tokenizer_name: "distilbert-base-uncased"

distillation:
  method: "kd_hinton"
  temperature: 2.0
  alpha: 0.5

data:
  train_path: "data/imdb_train.jsonl"
  val_path: "data/imdb_val.jsonl"

device:
  prefer_mps: true

output_root: "experiments"
seed: 42
