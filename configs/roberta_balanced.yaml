# =============================================================================
# Balanced Performance Configuration - RoBERTa → DistilRoBERTa
# =============================================================================
# Optimized for Mac M2 16GB RAM
# Expected: 1.5x compression, 1-3% accuracy drop
# RoBERTa typically performs better on sentiment analysis than BERT
# =============================================================================

# Training Configuration
train:
  epochs: 4                      # Slightly longer training for better results
  batch_size: 8
  lr: 2e-5
  grad_accum_steps: 1
  mixed_precision: false
  early_stop_patience: 3
  save_best_only: true
  log_interval: 10

# Model Configuration
model:
  # Teacher: RoBERTa-base (125M parameters)
  name: "roberta-base"
  
  # Student: DistilRoBERTa (82M parameters - 1.5x smaller)
  student_name: "distilroberta-base"
  
  type: "transformer"
  tokenizer_name: "roberta-base"
  max_length: 128
  num_labels: 2

# Knowledge Distillation Configuration
distillation:
  method: "kd_hinton"
  temperature: 2.5               # Medium temperature for moderate gap
  alpha: 0.4                     # Balanced soft/hard labels (60% soft, 40% hard)

# Data Configuration
data:
  train_path: "data/imdb_train.jsonl"
  val_path: "data/imdb_val.jsonl"

# Device Configuration
device:
  prefer_mps: true
  prefer_cuda: false

# Output Configuration
output_root: "experiments"
seed: 42

# Quantization
quantization:
  enable: true
  mode: ptq

# Advanced Features
similarity_transfer: true
evaluate: true
compare_models: true

# Explainability (optional)
explainability:
  enable_shap: false
  enable_lime: false
