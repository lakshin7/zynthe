# =============================================================================
# ELECTRA Configuration - ELECTRA-base → ELECTRA-small
# =============================================================================
# Optimized for Mac M2 8GB-16GB RAM
# Expected: 7.8x compression, 2-5% accuracy drop
# ELECTRA often more efficient than BERT with similar performance
# =============================================================================

# Training Configuration
train:
  epochs: 3
  batch_size: 6
  lr: 2e-5
  grad_accum_steps: 1
  mixed_precision: false
  early_stop_patience: 2
  save_best_only: true
  log_interval: 10

# Model Configuration
model:
  # Teacher: ELECTRA-base discriminator (110M parameters)
  name: "google/electra-base-discriminator"
  
  # Student: ELECTRA-small discriminator (14M parameters - 7.8x smaller!)
  student_name: "google/electra-small-discriminator"
  
  type: "transformer"
  tokenizer_name: "google/electra-base-discriminator"
  max_length: 128
  num_labels: 2

# Knowledge Distillation Configuration
distillation:
  method: "kd_hinton"
  temperature: 2.5               # Medium-high temperature for large gap
  alpha: 0.4                     # Balanced soft/hard labels

# Data Configuration
data:
  train_path: "data/imdb_train.jsonl"
  val_path: "data/imdb_val.jsonl"

# Device Configuration
device:
  prefer_mps: true
  prefer_cuda: false

# Output Configuration
output_root: "experiments"
seed: 42

# Quantization
quantization:
  enable: true
  mode: ptq

# Advanced Features
similarity_transfer: true
evaluate: true
compare_models: true

# Explainability (optional)
explainability:
  enable_shap: false
  enable_lime: false
