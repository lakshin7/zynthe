# M2 Air Test Configuration
# Optimized for Mac M2 with MPS acceleration
# Using TinyBERT models and Twitter Sentiment140 dataset

# Training configuration
train:
  epochs: 3
  batch_size: 16  # Optimized for M2 Air memory
  lr: 3e-5
  weight_decay: 0.01
  warmup_steps: 100
  early_stop_patience: 2

# Model configuration
model:
  # Teacher: TinyBERT 6-layer (67M parameters)
  name: huawei-noah/TinyBERT_General_6L_768D
  
  # Student: TinyBERT 4-layer (14M parameters) 
  student_name: huawei-noah/TinyBERT_General_4L_312D
  
  # Use teacher's tokenizer
  tokenizer_name: huawei-noah/TinyBERT_General_6L_768D
  
  # Model type
  type: sequenceclassification
  num_labels: 2

# Data configuration
data:
  train_path: data/sentiment140_train.jsonl
  val_path: data/sentiment140_val.jsonl
  max_length: 128  # Shorter for faster training
  test_size: 0.1    # 10% for validation

# Distillation configuration
distillation:
  type: kd  # Start with simple KD
  config:
    temperature: 4.0
    alpha: 0.7
    use_hints: false  # Disable hints for faster training

# Device configuration
device:
  prefer_mps: true
  prefer_cuda: false
  fallback_cpu: true

# Quantization (optional, can be disabled)
quantization:
  enable: false  # Disable for initial test
  mode: float16

# Evaluation
evaluate: true

# Experiment settings
experiment:
  name: m2_tinybert_sentiment140
  save_best_only: true
  log_interval: 50
