train:
  epochs: 2
  batch_size: 1
  lr: 1e-5
  grad_accum_steps: 16
  mixed_precision: true
  optimizer: adamw
  weight_decay: 0.01
  max_grad_norm: 1.0

model:
  name: "unsloth/Qwen2.5-3B-Instruct"
  student_name: "unsloth/Qwen2.5-1.5B-Instruct"
  type: "sequence_classification"
  tokenizer_name: "unsloth/Qwen2.5-3B-Instruct"
  max_length: 96
  torch_dtype: "float16"
  quantization:
    type: "bnb-4bit"
    target: "teacher"
    safe_fallback: true
  num_labels: 2
  label2id:
    negative: 0
    positive: 1
  id2label:
    0: negative
    1: positive

distillation:
  method: "attention_transfer"
  multi_stage: false
  config:
    attention_transfer:
      type: ["self", "relational"]
      weight: 0.35
      temperature: 1.2
      auto_detect_layers: true
      use_attention_rollout: true
      use_dual_matching: false
      use_cross_layer_flow: false
      normalization: "softmax"

data:
  train_path: "data/imdb_train.jsonl"
  val_path: "data/imdb_val.jsonl"
  dataset_id: "imdb"
  label_names:
    - negative
    - positive

preprocessing:
  text_field: text
  label_field: label
  merge_fields: []
  task_prefix: null
  lowercase: true
  strip: true
  cache_tokenized: false

output_root: "experiments"
seed: 42