# Auto-Generated Multi-Stage Configuration
# ==========================================
# This config relies on preflight analysis to auto-generate stages

training:
  epochs_per_stage: 3
  learning_rate: 5.0e-5
  weight_decay: 0.01
  device: "auto"  # Preflight will select

data:
  batch_size: 32  # Preflight will optimize
  num_workers: 4

distillation:
  multi_stage: true
  
  # Leave stages empty for auto-generation
  stages: []
  
  # Preflight will generate stages based on:
  # - Compression ratio
  # - Model architecture (vision/nlp/multimodal)
  # - Available compute resources
  # - Task type

# Preflight analysis results (populated automatically)
preflight:
  run_analysis: true
  auto_generate_stages: true
  
  # These will be filled by preflight analyzer
  model_type: null
  compression_ratio: null
  teacher_params: null
  student_params: null
  recommended_precision: null
  recommended_batch_size: null

output:
  experiment_dir: "experiments/multi_stage_auto"
  save_checkpoints: true
  save_reports: true
