# ===================================================================
# MATHEMATICAL FOUNDATION
# ===================================================================
# Similarity Transfer Loss:
#   L_sim = ||S_teacher - S_student||²_F
# 
# Where:
#   S = normalize(F) @ normalize(F)^T  (pairwise similarity matrix)
#   F = feature embeddings [batch_size, feature_dim]
#   ||·||²_F = Frobenius norm (element-wise squared differences)
#
# Metrics:
#   - cosine: S_ij = (f_i · f_j) / (||f_i|| ||f_j||)
#   - euclidean: S_ij = -||f_i - f_j||²
#   - graph: S_ij = A_ij where A is learned adjacency matrix
#
# Structural Alignment Score (SAS):
#   SAS = 1 - (||S_t - S_s||_F / sqrt(batch_size²)) ∈ [0, 1]
#   Higher is better (1.0 = perfect structural alignment)
# ===================================================================

# ===================================================================
# USAGE NOTES
# ===================================================================
# 1. Single vs Multi-layer:
#    - Use 'layer' for single layer (simpler, faster)
#    - Use 'layers' for multiple layers (more comprehensive)
#
# 2. Similarity Metrics:
#    - cosine: Angle-based, rotation invariant
#    - euclidean: Distance-based, scale sensitive
#    - graph: Sparse, adaptive topology
#
# 3. Progressive Mode:
#    - Starts with shallow layers
#    - Adds deeper layers each epoch
#    - Gradual complexity increase
#
# 4. Cross-Modality:
#    - Requires multimodal teacher/student
#    - Aligns vision and text embeddings
#    - Inspired by CLIP training
#
# 5. Graph Mode:
#    - Sparse similarity matrices
#    - Adaptive threshold (default 0.5)
#    - Good for large batch sizes
#
# 6. SAS Metric:
#    - Tracks relationship preservation
#    - Range: [0, 1], higher is better
#    - Logged every epoch
# ===================================================================
