# configs/kaggle_dual_t4.yaml
# Dual T4 GPU configuration for Kaggle testing
# Uses CUDA:0 for teacher, CUDA:1 for student for maximum efficiency
# Testing: GPT-2-medium → GPT-2-small on CodeSearchNet with Feature Distillation

model:
  name: "gpt2-medium"  # Teacher: 355M params
  student_name: "gpt2"  # Student: 124M params
  type: "causallm"
  tokenizer_name: "gpt2"

data:
  dataset: "code_search_net"  # CodeSearchNet for code understanding
  max_length: 512
  batch_size: 8
  train_samples: 1000
  val_samples: 200

distillation:
  method: "feature_distillation"  # Match hidden layer representations
  gamma: 1e-3
  temperature: 3.0
  alpha: 0.6

train:
  engine: "legacy"
  epochs: 2
  batch_size: 8
  learning_rate: 5e-5
  gradient_accumulation_steps: 4
  warmup_ratio: 0.1
  save_checkpoints: true

device:
  cuda_device: 0
  teacher_device: 0
  student_device: 1
  pin_memory: true

runtime:
  seed: 42
  memory_management:
    gradient_checkpointing: true
    max_memory_gb: 14