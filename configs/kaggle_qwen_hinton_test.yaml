train:
  epochs: 2
  batch_size: 1
  lr: 1e-5
  grad_accum_steps: 16
  mixed_precision: true
  optimizer: adamw
  weight_decay: 0.01
  max_grad_norm: 1.0

model:
  name: "unsloth/Qwen2.5-1.5B-Instruct"
  student_name: "unsloth/Qwen2.5-0.5B-Instruct"
  type: "sequence_classification"
  tokenizer_name: "unsloth/Qwen2.5-1.5B-Instruct"
  max_length: 128
  torch_dtype: "float16"
  quantization:
    type: "bnb-4bit"
    target: "teacher"
    safe_fallback: true
  num_labels: 2
  label2id:
    negative: 0
    positive: 1
  id2label:
    0: negative
    1: positive

distillation:
  method: "kd_hinton"
  multi_stage: false
  config:
    kd_hinton:
      temperature: 4.0
      alpha: 0.7
      hint_enabled: false
      confidence_scaling: true

data:
  train_path: "data/imdb_train.jsonl"
  val_path: "data/imdb_val.jsonl"
  dataset_id: "imdb"
  label_names:
    - negative
    - positive

preprocessing:
  text_field: text
  label_field: label
  merge_fields: []
  task_prefix: null
  lowercase: true
  strip: true
  cache_tokenized: false

output_root: "experiments"
seed: 42
