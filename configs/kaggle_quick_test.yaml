# configs/kaggle_quick_test.yaml
# Quick validation config for Kaggle - runs in ~2 minutes
# Testing: DistilGPT2 self-distillation on wikitext with Multi-Stage

model:
  name: "distilgpt2"  # Teacher: 66M params
  student_name: "distilgpt2"
  type: "causallm"
  tokenizer_name: "distilgpt2"

data:
  dataset: "wikitext"  # wikitext-2-v1 for language modeling
  max_length: 128
  batch_size: 32
  train_samples: 50
  val_samples: 20

distillation:
  method: "multi_stage"  # Multi-stage distillation
  strategies:
    - name: "feature_distillation"
      gamma: 1e-3
    - name: "attention_transfer"
      beta: 1e-4
  temperature: 2.0
  alpha: 0.5

train:
  engine: "legacy"
  epochs: 1
  batch_size: 32
  learning_rate: 3.0e-5
  optimizer: "lion"

device:
  cuda_device: 0
  teacher_device: 0
  student_device: 0

runtime:
  seed: 42
  memory_management:
    gradient_checkpointing: true
