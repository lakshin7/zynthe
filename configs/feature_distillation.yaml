# ============================================================================
# Feature Distillation Configuration - All 4 Stages
# ============================================================================

experiment_name: "feature_distillation_advanced"
description: "Multi-stage feature distillation with CKA, Gram, FSP, and CRD"

# ============================================================================
# Models
# ============================================================================
models:
  teacher:
    name: "bert-base-uncased"
    checkpoint: null
  
  student:
    name: "distilbert-base-uncased"
    checkpoint: null

# ============================================================================
# Feature Distillation Configuration
# ============================================================================
feature_distillation:
  enabled: true
  
  # Layer mapping (teacher -> student)
  layers:
    # Early layers
    - teacher: "bert.encoder.layer.2"
      student: "distilbert.transformer.layer.0"
      weight: 0.5
    
    # Middle layers
    - teacher: "bert.encoder.layer.6"
      student: "distilbert.transformer.layer.2"
      weight: 1.0
    
    # Late layers
    - teacher: "bert.encoder.layer.10"
      student: "distilbert.transformer.layer.4"
      weight: 1.5
  
  # ============================================================================
  # Stage 1 & 2: Metrics Selection
  # ============================================================================
  # Available: l2, cosine, gram, cka, ab, contrastive
  metrics:
    - "l2"          # Stage 1: Vanilla feature regression
    - "cka"         # Stage 2: Centered Kernel Alignment
    - "cosine"      # Stage 2: Cosine similarity
    - "gram"        # Stage 2: Gram matrix (style transfer)
  
  # Metric weights (relative importance)
  metric_weights:
    l2: 1.0
    cka: 0.8
    cosine: 0.5
    gram: 0.3
  
  # ============================================================================
  # Stage 3: Attention-Augmented Features
  # ============================================================================
  use_attention: false  # Set to true to enable attention weighting
  
  # ============================================================================
  # Stage 4: Advanced Paradigms
  # ============================================================================
  
  # FSP Matrix (Flow of Solution Process)
  # Captures relationships between consecutive layer pairs
  fsp_pairs:
    - [0, 1]  # layers[0] -> layers[1]
    - [1, 2]  # layers[1] -> layers[2]
  
  # Contrastive learning temperature
  contrastive_temperature: 0.07
  
  # ============================================================================
  # Auto Alignment & Adapters
  # ============================================================================
  auto_align: true
  adapter_type: "1x1conv"  # Options: 1x1conv, linear, mlp
  
# ============================================================================
# Training Configuration
# ============================================================================
training:
  batch_size: 16
  num_epochs: 10
  learning_rate: 2e-5
  weight_decay: 0.01
  grad_clip: 1.0
  
  optimizer:
    type: "adamw"
    lr: 2e-5
    weight_decay: 0.01
  
  scheduler:
    type: "cosine"
    warmup_steps: 500

# ============================================================================
# Loss Composition (Overall)
# ============================================================================
loss:
  # L = α*L_CE + β*L_feat + γ*L_FSP
  supervised_weight: 1.0      # α: Cross-entropy
  feature_weight: 0.5         # β: Feature distillation
  fsp_weight: 0.2             # γ: FSP matrix

# ============================================================================
# Evaluation Metrics
# ============================================================================
evaluation:
  metrics:
    - "accuracy"
    - "f1"
    - "feature_cka"         # Feature alignment via CKA
    - "feature_cosine"      # Feature similarity
    - "feature_l2"          # Feature distance
  
  # Compute feature alignment every N steps
  alignment_eval_steps: 100

# ============================================================================
# Device & Performance
# ============================================================================
device: "auto"  # auto, cuda, mps, cpu
mixed_precision: false
gradient_checkpointing: false

# ============================================================================
# Logging & Checkpointing
# ============================================================================
logging:
  log_interval: 10
  save_steps: 500
  eval_steps: 100
  
  # Feature visualization
  visualize_features: false
  visualization_interval: 500

output_dir: "./experiments"
