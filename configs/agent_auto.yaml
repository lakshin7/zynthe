train:
  epochs: 3
  batch_size: 8
  lr: 2e-5
  grad_accum_steps: 1
  mixed_precision: false
  early_stop_patience: 2
  
  optimizer: adamw
  weight_decay: 0.01
  max_grad_norm: 1.0
  
  scheduler: cosine
  warmup_steps: 50
  
  # No teacher training needed - agent will select a pre-trained one
  train_teacher: false

model:
  # ⚠️ NO TEACHER SPECIFIED - Agent will automatically select one!
  # name: "bert-base-uncased"  # Commented out - let agent decide
  
  # Student model
  student_name: "distilbert-base-uncased"
  type: "transformer"
  tokenizer_name: "distilbert-base-uncased"
  max_length: 128

distillation:
  method: "kd_hinton"
  temperature: 1.5
  alpha: 0.4

data:
  train_path: "data/imdb_train.jsonl"
  val_path: "data/imdb_val.jsonl"

device:
  prefer_mps: true
  prefer_cuda: false

output_root: "experiments"
seed: 42

quantization:
  enable: true
  mode: ptq

similarity_transfer: true
