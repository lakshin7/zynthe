# ============================================================================
# Multimodal Attention Transfer Configuration
# ============================================================================
# 
# Configuration for multimodal models (e.g., CLIP, BLIP, LLaVA)
# Demonstrates dual attention matching for vision-language models.
#
# Note: This is a TEMPLATE. Multimodal support is in development.
# Use this as a reference for extending Zynthe to vision models.
# ============================================================================

train:
  epochs: 5
  batch_size: 16
  lr: 1e-5
  grad_accum_steps: 2
  mixed_precision: false
  early_stop_patience: 3
  save_best_only: true
  log_interval: 20

model:
  # Example: CLIP teacher → smaller CLIP student
  name: "openai/clip-vit-base-patch32"
  student_name: "openai/clip-vit-base-patch16"  # or a distilled variant
  type: "multimodal"
  max_length: 77  # CLIP text length

# ============================================================================
# ATTENTION TRANSFER FOR MULTIMODAL
# ============================================================================
distillation:
  method: "attention_transfer"
  temperature: 2.5
  alpha: 0.4

attention_transfer:
  enabled: true
  
  # Multimodal-specific configuration
  type: ["spatial", "self", "relational"]
  
  # Dual Attention Matching: Essential for multimodal
  # Aligns both:
  # - Visual feature attention (spatial)
  # - Text token attention (self-attention)
  use_dual_matching: true
  
  # Cross-modal attention alignment
  use_cross_layer_flow: true
  
  # Layer extraction
  teacher_layers:
    - "vision_model.encoder.layers.6"
    - "vision_model.encoder.layers.11"
    - "text_model.encoder.layers.6"
    - "text_model.encoder.layers.11"
  
  student_layers:
    - "vision_model.encoder.layers.3"
    - "vision_model.encoder.layers.5"
    - "text_model.encoder.layers.3"
    - "text_model.encoder.layers.5"
  
  # Map teacher (12 layers) → student (6 layers)
  layer_mapping:
    "vision_model.encoder.layers.6": "vision_model.encoder.layers.3"
    "vision_model.encoder.layers.11": "vision_model.encoder.layers.5"
    "text_model.encoder.layers.6": "text_model.encoder.layers.3"
    "text_model.encoder.layers.11": "text_model.encoder.layers.5"
  
  normalization: "softmax"
  
  # Multimodal benefits from contrastive loss
  loss_types: ["l2", "contrastive", "relational"]
  loss_weights: [0.4, 0.4, 0.2]
  
  weight: 0.3

# ============================================================================
# DATA (to be implemented for vision models)
# ============================================================================
data:
  train_path: "data/coco_captions_train.jsonl"
  val_path: "data/coco_captions_val.jsonl"
  # Future: support for image loading
  image_root: "data/coco/images"
  
device:
  prefer_mps: true
  prefer_cuda: false

output_root: "experiments"
seed: 42

quantization:
  enable: false  # CLIP quantization is tricky

similarity_transfer: true

evaluate: true
compare_models: true

explainability:
  visualize_attention: true
  attention_visualization_path: "multimodal_attention"
