train:
  epochs: 3
  batch_size: 16
  lr: 3e-5
  grad_accum_steps: 2
  mixed_precision: true
  early_stop_patience: 2
  optimizer: adamw
  weight_decay: 0.01
  max_grad_norm: 1.0
  centralize_grads: false
  dynamic_lr: true
  scheduler: cosine
  warmup_steps: 20
  warmup_type: linear
  train_teacher: false
  teacher_epochs: 2
  teacher_lr: 2e-5

model:
  name: "gpt2"                    # Teacher: GPT-2 (124M params)
  student_name: "distilgpt2"      # Student: DistilGPT-2 (82M params)
  type: "transformer"
  tokenizer_name: "gpt2"
  max_length: 128

distillation:
  method: "kd_hinton"
  temperature: 2.0
  alpha: 0.6
  multi_stage: false

data:
  train_path: "data/sst2_test/train.jsonl"
  val_path: "data/sst2_test/validation.jsonl"
  dataset_id: "glue/sst2"
  label_names:
    - negative
    - positive

preprocessing:
  text_field: text
  label_field: label
  merge_fields: []
  task_prefix: null
  lowercase: true
  strip: true
  cache_tokenized: false

device:
  prefer_mps: true
  prefer_cuda: true

agentic:
  enable_teacher_agent: false
  enable_auto_student: false

output_root: "experiments"
seed: 42
