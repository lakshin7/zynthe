train:
  epochs: 5
  batch_size: 64
  lr: 3e-4
  optimizer: adamw
  weight_decay: 0.05
  scheduler: cosine
  warmup_steps: 200
  early_stop_patience: 3
  mixed_precision: true

model:
  name: "vit-base-patch16"
  student_name: "vit-base-patch16"
  type: "vision"
  image_size: 224

# For CIFAR10 via torchvision; image pipeline auto-routes
data:
  type: image
  dataset_id: cifar10
  image_root: ./data

preprocessing:
  image_mean: [0.485, 0.456, 0.406]
  image_std: [0.229, 0.224, 0.225]
  augment:
    random_flip: true
    random_crop: false
    color_jitter: false

# Disable quantization during quick tests
quantization:
  enable: false

output_root: "experiments"
seed: 42
