train:
  epochs: 2
  batch_size: 1
  lr: 1e-5
  grad_accum_steps: 16
  mixed_precision: true
  optimizer: adamw
  weight_decay: 0.01
  max_grad_norm: 1.0

model:
  name: "unsloth/Llama-3.2-3B-Instruct"
  student_name: "unsloth/Llama-3.2-1B-Instruct"
  type: "sequence_classification"
  tokenizer_name: "unsloth/Llama-3.2-3B-Instruct"
  max_length: 96
  torch_dtype: "float16"
  quantization:
    type: "bnb-4bit"
    target: "teacher"
    safe_fallback: true
  num_labels: 2
  label2id:
    negative: 0
    positive: 1
  id2label:
    0: negative
    1: positive

distillation:
  method: "feature_distillation"
  multi_stage: false
  config:
    feature_distillation:
      layers:
        - teacher: "model.layers.0"
          student: "model.layers.0"
          weight: 1.0
        - teacher: "model.layers.1"
          student: "model.layers.1"
          weight: 0.8
      metrics: ["l2", "cka"]
      metric_weights:
        l2: 1.0
        cka: 0.6
      auto_align: true
      adapter_type: "1x1conv"
      use_attention: false
      contrastive_temperature: 0.07

data:
  train_path: "data/imdb_train.jsonl"
  val_path: "data/imdb_val.jsonl"
  dataset_id: "imdb"
  label_names:
    - negative
    - positive

preprocessing:
  text_field: text
  label_field: label
  merge_fields: []
  task_prefix: null
  lowercase: true
  strip: true
  cache_tokenized: false

output_root: "experiments"
seed: 42
