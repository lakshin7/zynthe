# Auto-Student Configuration
# Automatically generate student architectures from teacher models

# Teacher model specification
teacher:
  name: "bert-base-uncased"
  # Or use custom config:
  # custom_config:
  #   num_layers: 12
  #   hidden_size: 768
  #   num_attention_heads: 12
  #   intermediate_size: 3072
  #   vocab_size: 30522

# Auto-student generation settings
auto_student:
  enabled: true
  
  # Compression ratio (0.0-1.0)
  # 0.5 = 50% of teacher size, 0.3 = 30% of teacher size
  compression_ratio: 0.5
  
  # Sizing strategy
  # - conservative: Reduce depth primarily, keep width mostly intact
  # - balanced: Reduce both depth and width proportionally (RECOMMENDED)
  # - aggressive: Heavy reduction in all dimensions
  strategy: "balanced"
  
  # Validation settings
  validate: true
  auto_fix: true
  
  # Memory constraints (GB)
  available_memory: 8.0
  
  # Generate multiple candidates
  multi_candidate:
    enabled: false
    compression_ratios: [0.3, 0.4, 0.5, 0.6]
    strategies: ["conservative", "balanced", "aggressive"]
  
  # Output settings
  save_configs: true
  output_dir: "data/generated_students"

# Data configuration
data:
  dataset: "imdb"
  max_samples: 1000
  split_ratio: 0.8
  batch_size: 8
  max_length: 128

# Training configuration
train:
  epochs: 3
  batch_size: 8
  lr: 2e-5
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_steps: 100
  gradient_accumulation: 1
  max_grad_norm: 1.0
  
  # Optimizer config
  optimizer_config:
    type: "adamw"
    lr: 2e-5
    betas: [0.9, 0.999]
    eps: 1e-8
    weight_decay: 0.01
    gradient_clip: 1.0
    
    # Gradient management
    gradient_management:
      clip_method: "norm"
      clip_value: 1.0
      gradient_centralization: false
      gradient_noise: 0.0
    
  # Scheduler config
  scheduler_config:
    type: "cosine"
    warmup_steps: 100
    warmup_ratio: 0.1
    min_lr: 1e-7
    
    # Multi-stage scheduling (optional)
    multi_stage:
      enabled: false
      stages:
        - epochs: 1
          lr: 3e-5
          optimizer_override: null
        - epochs: 2
          lr: 2e-5
          optimizer_override: null

# Distillation configuration
distillation:
  method: "kd_hinton"
  temperature: 2.0
  alpha: 0.5
  
  loss_weights:
    distillation: 0.5
    task: 0.5

# Evaluation configuration
evaluation:
  metrics: ["accuracy", "f1", "precision", "recall"]
  extended_metrics: true
  
  # Extended metrics
  extended:
    dei: true  # Distillation Effectiveness Index
    cas: true  # Capacity Alignment Score
    kl_div: true
    js_div: true

# System configuration
device: "mps"  # cuda, cpu, or mps
seed: 42
output_dir: "experiments"
log_level: "INFO"
