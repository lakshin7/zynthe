# Minimal stable Causal-LM distillation config
# Purpose: production-safe single-GPU core training only.

seed: 42

model:
  # Replace with your models
  teacher_name: gpt2
  student_name: distilgpt2
  max_length: 256

data:
  train_path: data/sample_train.jsonl
  val_path: data/sample_val.jsonl
  dataset_id: causal_lm_jsonl

train:
  engine: causal_lm_core
  epochs: 3
  batch_size: 4
  lr: 2.0e-5
  weight_decay: 0.01
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  emergency_grad_norm: 1000.0
  use_amp: true
  num_workers: 0
  pin_memory: true
  log_interval: 25
  fail_policy: skip_step_with_backoff
  warmup_steps: 100

distillation:
  task_type: causal_lm
  temperature: 2.0
  alpha: 0.7
  use_ce: true
  ignore_index: -100
  shift_labels: true
  logit_clip: 80.0
  min_valid_tokens: 1

checkpoint:
  save_every_epoch: true
  load_strict_first: true
  allow_shape_mismatch_fallback: true

evaluate: true
quantization:
  enable: false
