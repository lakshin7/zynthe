# Vision distillation reference config (CPU/T4 friendly)

train:
  epochs: 3
  batch_size: 32
  lr: 3e-4
  optimizer: adamw
  weight_decay: 0.05
  scheduler: cosine
  warmup_steps: 100
  early_stop_patience: 3
  mixed_precision: false

model:
  name: "google/vit-base-patch16-224"
  student_name: "WinKawaks/vit-tiny-patch16-224"
  type: "vision"
  image_size: 224

data:
  type: image
  modality: vision
  image_dataset: cifar10
  dataset_id: cifar10
  image_root: ./data
  val_split: 0.1

preprocessing:
  image_mean: [0.485, 0.456, 0.406]
  image_std: [0.229, 0.224, 0.225]
  augment:
    random_flip: true
    random_crop: true
    color_jitter: false

quantization:
  enable: false

output_root: "experiments"
seed: 42
