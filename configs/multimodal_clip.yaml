# Multimodal foundation config (infrastructure readiness)
# This config validates routing and artifacts for CLIP-style setups.

train:
  epochs: 2
  batch_size: 8
  lr: 1e-5
  grad_accum_steps: 2
  mixed_precision: false
  early_stop_patience: 2

model:
  name: "openai/clip-vit-base-patch32"
  student_name: "openai/clip-vit-base-patch32"
  type: "multimodal"
  max_length: 77
  image_size: 224

data:
  type: image
  modality: multimodal
  # Foundation path: image_folder or hf:<dataset_id>
  image_dataset: image_folder
  dataset_id: image_folder
  image_root: ./data/multimodal
  val_split: 0.2

# Distillation settings are placeholders until full multimodal loss wiring lands.
distillation:
  method: attention_transfer
  temperature: 2.5
  alpha: 0.4

attention_transfer:
  enabled: true
  use_dual_matching: true
  use_cross_layer_flow: true

output_root: "experiments"
seed: 42
