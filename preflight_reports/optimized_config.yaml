data:
  batch_size: 32
  num_workers: 4
  pin_memory: true
distillation:
  alpha: 0.5
  layer_mapping:
    mappings:
    - confidence: high
      student: embeddings.LayerNorm
      teacher: embeddings.LayerNorm
    - confidence: high
      student: encoder.layer.0
      teacher: encoder.layer.0
    - confidence: high
      student: encoder.layer.0.attention
      teacher: encoder.layer.0.attention
    - confidence: high
      student: encoder.layer.1
      teacher: encoder.layer.1
    - confidence: high
      student: encoder.layer.1.attention
      teacher: encoder.layer.1.attention
    - confidence: high
      student: encoder.layer.2
      teacher: encoder.layer.2
    - confidence: high
      student: encoder.layer.2.attention
      teacher: encoder.layer.2.attention
    - confidence: high
      student: encoder.layer.3
      teacher: encoder.layer.3
    - confidence: high
      student: encoder.layer.3.attention
      teacher: encoder.layer.3.attention
    - confidence: high
      student: encoder.layer.4
      teacher: encoder.layer.4
    - confidence: high
      student: encoder.layer.4.attention
      teacher: encoder.layer.4.attention
    student_depth: 11
    teacher_depth: 11
    total_mappings: 11
  method: logit
  temperature: 4.0
training:
  device: mps
  epochs: 10
  learning_rate: 5.0e-05
  precision: bf16
  use_amp: true
